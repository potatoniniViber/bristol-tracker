<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
    <title>🚽 布里斯托探员 · 最终版</title>
    <style>
        /* ===== 全局样式 ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #faf6f0;
            padding: 20px;
            color: #2d241a;
            max-width: 900px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 24px 20px 28px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.05);
            margin-bottom: 24px;
            border: 1px solid #f0e8e0;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sub {
            color: #7f6b5a;
            font-size: 0.95rem;
            border-bottom: 1px solid #eee5dd;
            padding-bottom: 14px;
            margin-bottom: 18px;
        }

        /* ===== Tabs ===== */
        .tabs {
            display: flex;
            gap: 6px;
            background: #f0e8e0;
            border-radius: 40px;
            padding: 4px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: transparent;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            color: #5a4a3a;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            color: #2d241a;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
            animation: fade 0.25s ease;
        }
        @keyframes fade {
            from { opacity: 0.3; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 便便选择器（3列） ===== */
        .stool-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 16px;
            align-items: center;
        }
        /* 类型按钮样式 */
        .stool-btn {
            background: #f8f4f0;
            border: 3px solid transparent;
            border-radius: 28px;
            padding: 16px 8px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            font-size: 2.2rem;
            line-height: 1.3;
            position: relative;
            width: 100%;
        }
        .stool-btn:hover {
            background: #efe8e0;
            transform: scale(1.02);
        }
        .stool-btn.selected {
            border-color: #c7a17a;
            background: #ede5db;
            box-shadow: 0 0 0 4px rgba(199,161,122,0.2);
        }
        .stool-btn .label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #3d2c1e;
            margin-top: 4px;
        }
        .stool-btn .hint {
            display: block;
            font-size: 0.7rem;
            color: #5a4a3a;
            font-weight: 400;
            margin-top: 2px;
            line-height: 1.4;
        }

        /* ===== 独立的无排便按钮（放在第三行第一列，保持原尺寸） ===== */
        .no-poop-btn-grid {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 40px;
            border: 2px solid #ddd0c4;
            background: transparent;
            font-weight: 600;
            font-size: 0.95rem;
            color: #5a4a3a;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            justify-self: start;          /* 靠左对齐 */
            align-self: center;
            width: auto;
            margin: 0;
            line-height: 1.5;
            text-align: center;
        }
        .no-poop-btn-grid:hover {
            background: #f5f0eb;
            border-color: #b5a092;
        }
        .no-poop-btn-grid.active {
            background: #ddd0c4;
            border-color: #b5a092;
            color: #2d241a;
        }

        /* ===== tooltip（仅类型按钮有） ===== */
        .stool-btn .tooltip {
            visibility: hidden;
            opacity: 0;
            width: 220px;
            background: #2d241a;
            color: #f5f0eb;
            text-align: left;
            border-radius: 16px;
            padding: 12px 14px;
            position: absolute;
            z-index: 100;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            transition: opacity 0.2s, visibility 0.2s;
            font-size: 0.75rem;
            font-weight: 400;
            line-height: 1.5;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            pointer-events: none;
        }
        .stool-btn .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -8px;
            border-width: 8px;
            border-style: solid;
            border-color: #2d241a transparent transparent transparent;
        }
        .stool-btn:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }
        .stool-btn .tooltip .line {
            margin-bottom: 2px;
        }
        .stool-btn .tooltip .line:last-child {
            margin-bottom: 0;
        }
        .stool-btn .tooltip .status-good {
            color: #8bc34a;
        }
        .stool-btn .tooltip .status-warn {
            color: #ffb74d;
        }
        .stool-btn .tooltip .status-bad {
            color: #ef5350;
        }

        /* ===== 其他组件 ===== */
        .water-section {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: #f5f0eb;
            padding: 12px 18px;
            border-radius: 40px;
            margin: 6px 0 16px;
        }
        .water-section label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .water-section input {
            flex: 1;
            min-width: 80px;
            padding: 8px 14px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            background: white;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.04);
        }
        .water-section input:focus {
            outline: 2px solid #c7a17a;
            outline-offset: 2px;
        }

        .btn-primary {
            background: #c7a17a;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(199,161,122,0.25);
        }
        .btn-primary:hover {
            background: #b58d66;
            transform: translateY(-2px);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-secondary {
            background: transparent;
            border: 2px solid #ddd0c4;
            color: #5a4a3a;
            border-radius: 60px;
            padding: 10px 20px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        .btn-secondary:hover {
            background: #f5f0eb;
            border-color: #c7a17a;
        }

        .result-box {
            margin-top: 18px;
            padding: 16px 18px;
            border-radius: 28px;
            background: #f8f4f0;
            display: none;
        }
        .result-box.show {
            display: block;
            animation: fade 0.3s;
        }
        .result-score {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 1.4rem;
            font-weight: 700;
        }
        .result-score .emoji-big {
            font-size: 2.6rem;
        }
        .result-advice {
            margin-top: 10px;
            padding: 12px 16px;
            background: white;
            border-radius: 20px;
            line-height: 1.6;
            border-left: 4px solid #c7a17a;
        }

        /* 今日摘要 */
        .today-entries {
            margin: 12px 0 8px;
            font-size: 0.95rem;
            color: #3d2c1e;
        }
        .today-entries .entry-item {
            display: inline-block;
            background: #f0e8e0;
            padding: 4px 14px;
            border-radius: 30px;
            margin: 4px 6px 4px 0;
            cursor: pointer;
            transition: background 0.15s;
            border: 2px solid transparent;
        }
        .today-entries .entry-item:hover {
            background: #e0d5c8;
        }
        .today-entries .entry-item.editing {
            border-color: #c7a17a;
            background: #ede5db;
            padding: 2px 6px;
        }
        .today-entries .entry-item .edit-input {
            border: none;
            background: transparent;
            font-size: 0.9rem;
            width: 60px;
            font-weight: 500;
            color: #2d241a;
        }
        .today-entries .entry-item .edit-input:focus {
            outline: none;
        }
        .today-entries .entry-item .edit-type {
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* 近7日记录 */
        .week-records {
            margin-top: 20px;
            border-top: 1px solid #eee5dd;
            padding-top: 16px;
        }
        .week-records .week-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .week-records .week-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .week-records .week-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8f4f0;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .week-records .week-item .date {
            color: #7f6b5a;
            font-weight: 500;
            min-width: 60px;
        }
        .week-records .week-item .emojis {
            font-size: 1.3rem;
            letter-spacing: 2px;
        }
        .week-records .week-item .water {
            color: #5a7a8a;
            font-size: 0.8rem;
        }
        .week-records .week-summary {
            margin-top: 10px;
            padding: 8px 14px;
            background: #f0e8e0;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #3d2c1e;
            text-align: center;
        }

        /* 月历 */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .calendar-header button {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 4px 16px;
            border-radius: 30px;
            transition: background 0.15s;
        }
        .calendar-header button:hover {
            background: #f0e8e0;
        }
        .calendar-header .month-year {
            font-weight: 600;
            font-size: 1.4rem;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }
        .calendar-grid .day-name {
            text-align: center;
            font-weight: 600;
            font-size: 0.8rem;
            color: #7f6b5a;
            padding: 6px 0;
        }
        .calendar-grid .day-cell {
            aspect-ratio: 1 / 1;
            background: #f8f4f0;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 500;
            color: #2d241a;
            cursor: default;
            transition: 0.1s;
            position: relative;
            border: 2px solid transparent;
            padding: 2px;
        }
        .calendar-grid .day-cell.clickable {
            cursor: pointer;
        }
        .calendar-grid .day-cell.clickable:hover {
            border-color: #c7a17a;
            transform: scale(1.03);
        }
        .calendar-grid .day-cell .day-number {
            font-size: 0.7rem;
            font-weight: 600;
            color: #5a4a3a;
            position: absolute;
            top: 3px;
            left: 6px;
        }
        .calendar-grid .day-cell .emojis-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1px;
            font-size: 1.2rem;
            line-height: 1.3;
        }
        .calendar-grid .day-cell .emojis-container .mini-emoji {
            font-size: 1.2rem;
        }
        .calendar-grid .day-cell .emojis-container .more-indicator {
            font-size: 0.7rem;
            color: #7f6b5a;
        }
        .day-cell.good {
            background: #e3f0df;
        }
        .day-cell.warn {
            background: #f5e6d3;
        }
        .day-cell.bad {
            background: #fcd9d4;
        }
        .day-cell.none {
            background: #eee9e4;
        }
        .day-cell.miss {
            background: #f4f0ed;
            border: 1px dashed #ccc;
        }
        .day-cell.future {
            background: #fcfcfc;
            opacity: 0.5;
            cursor: default;
        }
        .day-cell.unused {
            background: #f4f2f0;
            color: #bbb;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
            animation: fade 0.2s;
        }
        .modal-box {
            background: white;
            border-radius: 40px;
            max-width: 480px;
            width: 100%;
            padding: 28px 24px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-box h2 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-box .close-btn {
            float: right;
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #7f6b5a;
            padding: 0 6px;
        }
        .modal-box .record-list {
            margin: 12px 0;
            padding: 0;
            list-style: none;
        }
        .modal-box .record-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0e8e0;
            font-size: 1rem;
        }
        .modal-box .record-list li .time {
            color: #7f6b5a;
            font-size: 0.85rem;
            min-width: 50px;
        }
        .modal-box .record-list li .type-emoji {
            font-size: 1.6rem;
            cursor: pointer;
        }
        .modal-box .record-list li .edit-controls {
            display: flex;
            gap: 6px;
        }
        .modal-box .record-list li .edit-controls button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 0 4px;
        }
        .modal-box .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }
        .modal-box .modal-actions .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .modal-box .modal-actions .row .stool-mini {
            background: #f8f4f0;
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.1s;
            flex: 1 0 50px;
            text-align: center;
        }
        .modal-box .modal-actions .row .stool-mini:hover {
            background: #efe8e0;
        }
        .modal-box .modal-actions .row .stool-mini.selected-mini {
            border-color: #c7a17a;
            background: #ede5db;
        }
        .modal-box .modal-actions .no-poop-mini {
            padding: 10px 18px;
            border-radius: 30px;
            border: 2px solid #ddd0c4;
            background: transparent;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
        }
        .modal-box .modal-actions .no-poop-mini.active {
            background: #ddd0c4;
            border-color: #b5a092;
        }
        .modal-box .modal-actions .water-mini {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-box .modal-actions .water-mini input {
            flex: 1;
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid #ddd0c4;
            font-size: 1rem;
            width: 100px;
        }
        .modal-box .modal-actions .btn-sm {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            background: #c7a17a;
            color: white;
            transition: 0.15s;
        }
        .modal-box .modal-actions .btn-sm:hover {
            background: #b58d66;
        }
        .modal-box .modal-actions .btn-sm.secondary {
            background: transparent;
            border: 2px solid #ddd0c4;
            color: #5a4a3a;
        }
        .modal-box .modal-actions .btn-sm.secondary:hover {
            background: #f5f0eb;
        }

        /* 分析 */
        .analysis-box {
            background: #f5f0eb;
            border-radius: 28px;
            padding: 18px 20px;
            margin-top: 16px;
        }
        .analysis-box .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 16px;
            margin: 10px 0;
        }
        .analysis-box .stat-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            padding: 4px 0;
            border-bottom: 1px dashed #ddd0c4;
        }
        .analysis-box .stat-item .val {
            font-weight: 600;
        }
        .analysis-box .summary-text {
            margin-top: 12px;
            padding: 12px 16px;
            background: white;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            .stool-grid {
                gap: 10px;
            }
            .stool-btn {
                font-size: 1.8rem;
                padding: 12px 4px 8px;
            }
            .stool-btn .tooltip {
                width: 180px;
                font-size: 0.65rem;
                left: 50%;
                transform: translateX(-50%) translateY(-4px);
            }
            .no-poop-btn-grid {
                padding: 8px 14px;
                font-size: 0.85rem;
            }
            .calendar-grid .day-cell .emojis-container {
                font-size: 1rem;
            }
            .calendar-grid .day-cell .emojis-container .mini-emoji {
                font-size: 1rem;
            }
            .modal-box {
                padding: 20px 16px;
            }
        }
        @media (max-width: 400px) {
            .stool-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            /* 在2列下调整位置，简单起见让它们自动流动 */
            .no-poop-btn-grid {
                grid-column: auto !important;
            }
            .stool-btn.type7 {
                grid-column: auto !important;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>🚽 布里斯托探员</h1>
        <div class="sub">记录便便 · 关爱肠道 · 科学减肥</div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="daily">📝 每日记录</button>
            <button class="tab-btn" data-tab="calendar">📅 月历视图</button>
        </div>

        <!-- ===== Tab1: 每日记录 ===== -->
        <div class="tab-content active" id="tab-daily">
            <div class="card">
                <div style="font-weight:600;font-size:1.1rem;margin-bottom:10px;">📅 今天 · <span id="todayDateDisplay"></span></div>

                <!-- 便便选择器 -->
                <div class="stool-grid" id="stoolGrid"></div>

                <!-- 饮水量 -->
                <div class="water-section">
                    <label>💧 今日饮水量</label>
                    <input type="number" id="waterInput" min="0" max="5000" step="100" value="1500" />
                    <span style="font-size:0.9rem;color:#7f6b5a;">ml</span>
                </div>

                <button class="btn-primary" id="saveBtn">✅ 记录今日</button>

                <!-- 今日摘要 -->
                <div id="todayEntriesContainer" class="today-entries"></div>

                <!-- 评分建议 -->
                <div class="result-box" id="resultBox">
                    <div class="result-score">
                        <span class="emoji-big" id="resultEmoji">💩</span>
                        <span id="resultScoreText">评分：--</span>
                    </div>
                    <div class="result-advice" id="resultAdvice">
                        <strong>建议：</strong><span id="adviceText"></span>
                    </div>
                </div>
            </div>

            <!-- 近7日记录 -->
            <div class="card week-records" id="weekRecordsContainer">
                <div class="week-title">
                    <span>📋 近7日记录</span>
                </div>
                <div class="week-list" id="weekList"></div>
                <div class="week-summary" id="weekSummaryText">加载中...</div>
            </div>
        </div>

        <!-- ===== Tab2: 月历 ===== -->
        <div class="tab-content" id="tab-calendar">
            <div class="card">
                <div class="calendar-header">
                    <button id="prevMonth">‹</button>
                    <span class="month-year" id="monthYear">2026年6月</span>
                    <button id="nextMonth">›</button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
                <div style="font-size:0.75rem;color:#7f6b5a;display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;justify-content:center;">
                    <span><span style="background:#e3f0df;padding:2px 10px;border-radius:10px;">●</span> 健康</span>
                    <span><span style="background:#f5e6d3;padding:2px 10px;border-radius:10px;">●</span> 轻微异常</span>
                    <span><span style="background:#fcd9d4;padding:2px 10px;border-radius:10px;">●</span> 异常</span>
                    <span><span style="background:#eee9e4;padding:2px 10px;border-radius:10px;">●</span> 无排便</span>
                    <span><span style="background:#f4f0ed;border:1px dashed #ccc;padding:2px 10px;border-radius:10px;">●</span> 未记录</span>
                </div>

                <!-- 当月分析 -->
                <div class="analysis-box" id="monthAnalysisBox">
                    <div style="font-weight:600;margin-bottom:6px;" id="monthAnalysisTitle">📊 当月分析</div>
                    <div id="monthAnalysisContent">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 模态框 ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box" id="modalBox">
            <button class="close-btn" id="modalClose">✕</button>
            <h2 id="modalTitle">📅 日期详情</h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ============================================================
        //  数据定义 & 工具
        // ============================================================
        const STOOL_TYPES = [
            { id: 1, emoji: '💩', label: 'Type 1', hint: '干硬小球，羊粪蛋', score: 2, advice: '严重便秘！大量喝水，多吃西梅、火龙果、绿叶菜。',
                detail: '学名：坚果状（便秘）\n状态：🔴 异常\n实物：一颗颗硬邦邦的小球，掉在水里“咚咚”响，几乎不散开。' },
            { id: 2, emoji: '🪨', label: 'Type 2', hint: '凹凸香肠，疙疙瘩瘩', score: 4, advice: '轻度便秘。每天喝够2000ml水，主食换一半粗粮。',
                detail: '学名：香肠状（凹凸）\n状态：🟡 轻度异常\n实物：一整条，表面疙疙瘩瘩，像串起来的葡萄，拉的时候比较费劲。' },
            { id: 3, emoji: '🌭', label: 'Type 3', hint: '香肠状，表面有裂纹', score: 8, advice: '较理想。再多喝点水就完美了！',
                detail: '学名：香肠状（裂纹）\n状态：🟢 正常\n实物：一整条，表面有细细的裂缝，像热狗面包，拉得还算顺畅。' },
            { id: 4, emoji: '🍌', label: 'Type 4', hint: '光滑香蕉，完美形态', score: 10, advice: '🌟 最佳状态！继续保持！',
                detail: '学名：香蕉状（正常）\n状态：🟢 健康完美\n实物：光滑柔软，像香蕉或蛇，一顺到底，几乎不用使劲。' },
            { id: 5, emoji: '🥘', label: 'Type 5', hint: '软块面团，边缘清晰', score: 7, advice: '偏软。多吃苹果、胡萝卜稳固形态。',
                detail: '学名：软块状（偏软）\n状态：🟡 轻微异常\n实物：一小坨一小坨的，边缘清晰，冲水会散开但不成水，拉得特别急。' },
            { id: 6, emoji: '🥣', label: 'Type 6', hint: '糊糊粥，不成形', score: 3, advice: '腹泻前兆！忌口辛辣油腻，喝淡盐水。',
                detail: '学名：糊状（腹泻前兆）\n状态：🔴 异常\n实物：像粥或搅拌过的燕麦，毛茸茸的一滩，没有固定形状，冲水就糊成一片。' },
            { id: 7, emoji: '💧', label: 'Type 7', hint: '水样喷射，完全液体', score: 1, advice: '严重腹泻！立即补水，若持续请就医。',
                detail: '学名：水样状（腹泻）\n状态：🔴 严重异常\n实物：完全像水一样，没有固体，直接喷射出来，完全不受控制。' }
        ];

        function getTodayStr() {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function formatDate(str) {
            const parts = str.split('-');
            return parts[1] + '/' + parts[2];
        }

        function getRecords() {
            try { return JSON.parse(localStorage.getItem('poopRecords')) || {}; } catch (e) { return {}; }
        }

        function saveRecords(r) {
            localStorage.setItem('poopRecords', JSON.stringify(r));
        }

        function getDayRecord(dateStr) {
            const all = getRecords();
            return all[dateStr] || null;
        }

        function setDayRecord(dateStr, data) {
            const all = getRecords();
            all[dateStr] = data;
            saveRecords(all);
        }

        function deleteDayRecord(dateStr) {
            const all = getRecords();
            delete all[dateStr];
            saveRecords(all);
        }

        function getWorstType(entries) {
            if (!entries || entries.length === 0) return null;
            let worst = null,
                minScore = 999;
            entries.forEach(e => {
                const t = STOOL_TYPES.find(s => s.id === e.typeId);
                if (t && t.score < minScore) {
                    minScore = t.score;
                    worst = t;
                }
            });
            return worst;
        }

        function getDayDisplay(dateStr) {
            const rec = getDayRecord(dateStr);
            if (!rec) return { emojis: [], status: 'miss', tooltip: '未记录', allEntries: [] };
            if (rec.noBowel) return { emojis: ['🚫'], status: 'none', tooltip: '无排便', allEntries: [] };
            if (!rec.entries || rec.entries.length === 0) return { emojis: [], status: 'miss', tooltip: '未记录', allEntries: [] };
            const entries = rec.entries;
            const emojis = entries.map(e => {
                const t = STOOL_TYPES.find(s => s.id === e.typeId);
                return t ? t.emoji : '?';
            });
            const worst = getWorstType(entries);
            const score = worst ? worst.score : 5;
            let status = 'good';
            if (score >= 7) status = 'good';
            else if (score >= 4) status = 'warn';
            else status = 'bad';
            const tooltip = entries.map(e => {
                const t = STOOL_TYPES.find(s => s.id === e.typeId);
                return `${t ? t.emoji : '?'} ${t ? t.label : ''} ${e.time || ''}`;
            }).join('\n');
            return { emojis, status, tooltip, allEntries: entries };
        }

        // ============================================================
        //  渲染：便便选择器（互换位置）
        // ============================================================
        function renderStoolSelector(selectedTypeId, noPoopActive) {
            const grid = document.getElementById('stoolGrid');
            grid.innerHTML = '';

            // 1. 添加 Type 1 ~ Type 6
            const firstSix = STOOL_TYPES.slice(0, 6);
            firstSix.forEach(t => {
                const btn = document.createElement('div');
                btn.className = 'stool-btn' + (selectedTypeId === t.id ? ' selected' : '');
                btn.dataset.id = t.id;
                // 内容
                const emojiSpan = document.createElement('span');
                emojiSpan.textContent = t.emoji;
                btn.appendChild(emojiSpan);
                const labelSpan = document.createElement('span');
                labelSpan.className = 'label';
                labelSpan.textContent = t.label;
                btn.appendChild(labelSpan);
                const hintSpan = document.createElement('span');
                hintSpan.className = 'hint';
                hintSpan.textContent = t.hint;
                btn.appendChild(hintSpan);

                // tooltip
                const tooltip = document.createElement('div');
                tooltip.className = 'tooltip';
                const lines = t.detail.split('\n');
                lines.forEach(line => {
                    const p = document.createElement('div');
                    p.className = 'line';
                    if (line.includes('🔴')) p.style.color = '#ef5350';
                    else if (line.includes('🟡')) p.style.color = '#ffb74d';
                    else if (line.includes('🟢')) p.style.color = '#8bc34a';
                    p.textContent = line;
                    tooltip.appendChild(p);
                });
                btn.appendChild(tooltip);

                btn.addEventListener('click', () => {
                    document.querySelectorAll('.stool-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    // 取消无排便选中
                    const noBtn = document.querySelector('.no-poop-btn-grid');
                    if (noBtn) noBtn.classList.remove('active');
                    window.noPoopActive = false;
                    window.selectedTypeId = t.id;
                    showPreview(t.id);
                });
                grid.appendChild(btn);
            });

            // 2. 添加无排便按钮（放在第三行第一列）
            const noBtn = document.createElement('div');
            noBtn.className = 'no-poop-btn-grid' + (noPoopActive ? ' active' : '');
            noBtn.dataset.id = 'no-poop';
            noBtn.textContent = '🚫 今日无排便';
            // 强制放在第一列（grid-column: 1）并指定第三行（grid-row: 3）
            noBtn.style.gridColumn = '1';
            noBtn.style.gridRow = '3';
            noBtn.addEventListener('click', function() {
                document.querySelectorAll('.stool-btn').forEach(b => b.classList.remove('selected'));
                this.classList.toggle('active');
                const isActive = this.classList.contains('active');
                window.noPoopActive = isActive;
                if (isActive) {
                    window.selectedTypeId = null;
                    document.getElementById('resultBox').classList.remove('show');
                }
            });
            grid.appendChild(noBtn);

            // 3. 添加 Type 7（放在第三行第三列）
            const type7 = STOOL_TYPES.find(t => t.id === 7);
            const btn7 = document.createElement('div');
            btn7.className = 'stool-btn' + (selectedTypeId === 7 ? ' selected' : '');
            btn7.dataset.id = 7;
            btn7.classList.add('type7'); // 用于响应式
            // 内容
            const emoji7 = document.createElement('span');
            emoji7.textContent = type7.emoji;
            btn7.appendChild(emoji7);
            const label7 = document.createElement('span');
            label7.className = 'label';
            label7.textContent = type7.label;
            btn7.appendChild(label7);
            const hint7 = document.createElement('span');
            hint7.className = 'hint';
            hint7.textContent = type7.hint;
            btn7.appendChild(hint7);
            // tooltip
            const tooltip7 = document.createElement('div');
            tooltip7.className = 'tooltip';
            const lines7 = type7.detail.split('\n');
            lines7.forEach(line => {
                const p = document.createElement('div');
                p.className = 'line';
                if (line.includes('🔴')) p.style.color = '#ef5350';
                else if (line.includes('🟡')) p.style.color = '#ffb74d';
                else if (line.includes('🟢')) p.style.color = '#8bc34a';
                p.textContent = line;
                tooltip7.appendChild(p);
            });
            btn7.appendChild(tooltip7);
            // 强制放在第三列，第三行
            btn7.style.gridColumn = '3';
            btn7.style.gridRow = '3';
            btn7.addEventListener('click', () => {
                document.querySelectorAll('.stool-btn').forEach(b => b.classList.remove('selected'));
                btn7.classList.add('selected');
                const noBtn2 = document.querySelector('.no-poop-btn-grid');
                if (noBtn2) noBtn2.classList.remove('active');
                window.noPoopActive = false;
                window.selectedTypeId = 7;
                showPreview(7);
            });
            grid.appendChild(btn7);

            // 如果当前选中状态是无排便，则高亮无排便，否则高亮对应的类型
            // 但这里的调用会传入selectedTypeId和noPoopActive，已经在外部同步，这里只是渲染
        }

        // 全局变量
        let selectedTypeId = null;
        let noPoopActive = false;

        function showPreview(typeId) {
            const t = STOOL_TYPES.find(s => s.id === typeId);
            if (!t) return;
            const box = document.getElementById('resultBox');
            box.classList.add('show');
            document.getElementById('resultEmoji').textContent = t.emoji;
            document.getElementById('resultScoreText').textContent = `评分：${t.score}/10`;
            document.getElementById('adviceText').textContent = t.advice;
        }

        // ============================================================
        //  今日记录 & 摘要
        // ============================================================
        const todayStr = getTodayStr();
        document.getElementById('todayDateDisplay').textContent = formatDate(todayStr);

        function loadToday() {
            const rec = getDayRecord(todayStr);
            if (rec) {
                if (rec.noBowel) {
                    noPoopActive = true;
                    selectedTypeId = null;
                    document.getElementById('resultBox').classList.remove('show');
                } else if (rec.entries && rec.entries.length > 0) {
                    const last = rec.entries[rec.entries.length - 1];
                    selectedTypeId = last.typeId;
                    showPreview(selectedTypeId);
                }
                if (rec.water) document.getElementById('waterInput').value = rec.water;
                renderTodayEntries(rec);
            } else {
                document.getElementById('todayEntriesContainer').innerHTML = '';
                document.getElementById('resultBox').classList.remove('show');
            }
            renderStoolSelector(selectedTypeId, noPoopActive);
        }

        function renderTodayEntries(rec) {
            const container = document.getElementById('todayEntriesContainer');
            if (!rec || rec.noBowel || !rec.entries || rec.entries.length === 0) {
                container.innerHTML = rec && rec.noBowel ? '🚫 今日已标记无排便' : '';
                return;
            }
            let html = '已记录：';
            rec.entries.forEach((entry, index) => {
                const t = STOOL_TYPES.find(s => s.id === entry.typeId);
                const emoji = t ? t.emoji : '?';
                const label = t ? t.label : '';
                const time = entry.time || '';
                html += `<span class="entry-item" data-index="${index}" data-date="${todayStr}" title="双击编辑">${emoji} ${label} <span class="time">${time}</span></span>`;
            });
            container.innerHTML = html;

            container.querySelectorAll('.entry-item').forEach(el => {
                el.addEventListener('dblclick', function(e) {
                    e.stopPropagation();
                    const date = this.dataset.date;
                    const index = parseInt(this.dataset.index);
                    openInlineEditor(date, index, this);
                });
            });
        }

        function openInlineEditor(dateStr, index, element) {
            const rec = getDayRecord(dateStr);
            if (!rec || !rec.entries || index >= rec.entries.length) return;
            const entry = rec.entries[index];
            const originalHtml = element.innerHTML;
            const typeOptions = STOOL_TYPES.map(s =>
                `<option value="${s.id}" ${s.id === entry.typeId ? 'selected' : ''}>${s.emoji} ${s.label}</option>`
            ).join('');
            const timeVal = entry.time || '';
            element.classList.add('editing');
            element.innerHTML = `
                        <select class="edit-type">${typeOptions}</select>
                        <input class="edit-input" type="text" value="${timeVal}" placeholder="时间" style="width:70px;" />
                        <button class="save-edit" style="background:none;border:none;cursor:pointer;font-size:1rem;">💾</button>
                        <button class="cancel-edit" style="background:none;border:none;cursor:pointer;font-size:1rem;">✖</button>
                        <button class="delete-entry" style="background:none;border:none;cursor:pointer;font-size:1rem;">🗑️</button>
                    `;
            const sel = element.querySelector('.edit-type');
            const inp = element.querySelector('.edit-input');
            const saveBtn = element.querySelector('.save-edit');
            const cancelBtn = element.querySelector('.cancel-edit');
            const delBtn = element.querySelector('.delete-entry');

            saveBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                const newTypeId = parseInt(sel.value);
                const newTime = inp.value.trim();
                const rec2 = getDayRecord(dateStr);
                if (rec2 && rec2.entries && index < rec2.entries.length) {
                    rec2.entries[index].typeId = newTypeId;
                    rec2.entries[index].time = newTime || '';
                    setDayRecord(dateStr, rec2);
                    loadToday();
                    renderCalendar(currentYear, currentMonth);
                    updateAllAnalyses();
                    closeModal();
                }
            });
            cancelBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                element.innerHTML = originalHtml;
                element.classList.remove('editing');
                element.addEventListener('dblclick', function(ev) {
                    ev.stopPropagation();
                    const d = this.dataset.date;
                    const idx = parseInt(this.dataset.index);
                    openInlineEditor(d, idx, this);
                });
            });
            delBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (confirm('删除这条记录？')) {
                    const rec3 = getDayRecord(dateStr);
                    if (rec3 && rec3.entries) {
                        rec3.entries.splice(index, 1);
                        if (rec3.entries.length === 0) {
                            setDayRecord(dateStr, { water: rec3.water || 0, noBowel: false, entries: [] });
                        } else {
                            setDayRecord(dateStr, rec3);
                        }
                        loadToday();
                        renderCalendar(currentYear, currentMonth);
                        updateAllAnalyses();
                    }
                }
            });
        }

        document.getElementById('saveBtn').addEventListener('click', function() {
            const water = parseInt(document.getElementById('waterInput').value) || 0;
            if (water < 0) { alert('饮水量不能为负'); return; }

            const isNoBowel = window.noPoopActive;
            const typeId = window.selectedTypeId;

            if (isNoBowel) {
                setDayRecord(todayStr, { noBowel: true, water: water, entries: [] });
                loadToday();
                renderCalendar(currentYear, currentMonth);
                updateAllAnalyses();
                alert('已标记今日无排便');
                return;
            }

            if (!typeId) {
                alert('请选择便便类型或点击「无排便」');
                return;
            }

            const now = new Date();
            const timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            const newEntry = { typeId: typeId, time: timeStr };

            const existing = getDayRecord(todayStr);
            let updatedRec;
            if (existing && !existing.noBowel) {
                updatedRec = {
                    water: water,
                    noBowel: false,
                    entries: [...(existing.entries || []), newEntry]
                };
            } else {
                updatedRec = {
                    water: water,
                    noBowel: false,
                    entries: [newEntry]
                };
            }
            setDayRecord(todayStr, updatedRec);
            loadToday();
            renderCalendar(currentYear, currentMonth);
            updateAllAnalyses();
            const t = STOOL_TYPES.find(s => s.id === typeId);
            alert(`✅ 已记录 ${t.emoji} ${t.label}，饮水 ${water}ml`);
        });

        // ============================================================
        //  近7日记录
        // ============================================================
        function renderWeekRecords() {
            const all = getRecords();
            const datesWithRecords = Object.keys(all).filter(date => {
                const rec = all[date];
                return rec && (rec.entries?.length > 0 || rec.noBowel);
            });
            datesWithRecords.sort((a, b) => (a < b ? 1 : -1));
            const recent = datesWithRecords.slice(0, 7);

            const listEl = document.getElementById('weekList');
            if (recent.length === 0) {
                listEl.innerHTML = '<div style="color:#aaa;text-align:center;padding:12px;">暂无记录</div>';
                document.getElementById('weekSummaryText').textContent = '近7天暂无记录。';
                return;
            }

            let html = '';
            let totalEntries = 0,
                goodCount = 0,
                noBowelCount = 0;
            recent.forEach(date => {
                const rec = all[date];
                let display = '';
                let water = rec.water ? `💧 ${rec.water}ml` : '';
                if (rec.noBowel) {
                    display = '🚫 无排便';
                    noBowelCount++;
                } else if (rec.entries && rec.entries.length > 0) {
                    const emojis = rec.entries.map(e => {
                        const t = STOOL_TYPES.find(s => s.id === e.typeId);
                        if (t && t.score >= 7) goodCount++;
                        totalEntries++;
                        return t ? t.emoji : '?';
                    });
                    display = emojis.join(' ');
                } else {
                    display = '—';
                }
                const dateDisplay = formatDate(date);
                html += `<div class="week-item">
                            <span class="date">${dateDisplay}</span>
                            <span class="emojis">${display}</span>
                            <span class="water">${water}</span>
                        </div>`;
            });
            listEl.innerHTML = html;

            const summaryEl = document.getElementById('weekSummaryText');
            const healthRatio = totalEntries > 0 ? Math.round((goodCount / totalEntries) * 100) : 0;
            let msg = `近7天有 ${recent.length} 天有记录，总排便 ${totalEntries} 次，健康形态占比 ${healthRatio}%`;
            if (noBowelCount > 2) msg += `，⚠️ 有 ${noBowelCount} 天无排便，请增加水分和运动。`;
            else if (healthRatio >= 70) msg += '，✅ 肠道状态稳定，继续保持！';
            else if (healthRatio >= 40) msg += '，⚠️ 健康形态偏低，建议多吃蔬果。';
            else msg += '，🔴 异常占比较高，请调整饮食并及时就医。';
            summaryEl.textContent = msg;
        }

        // ============================================================
        //  月历
        // ============================================================
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();

        function renderCalendar(year, month) {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
            dayNames.forEach(d => {
                const div = document.createElement('div');
                div.className = 'day-name';
                div.textContent = d;
                grid.appendChild(div);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            const todayStrFull = getTodayStr();

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-cell unused';
                empty.style.background = 'transparent';
                grid.appendChild(empty);
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const dateStr = dateObj.getFullYear() + '-' + String(dateObj.getMonth() + 1).padStart(2, '0') + '-' + String(d)
                    .padStart(2, '0');
                const isFuture = dateObj > today;
                const isToday = dateStr === todayStrFull;

                const cell = document.createElement('div');
                cell.className = 'day-cell';
                const numSpan = document.createElement('span');
                numSpan.className = 'day-number';
                numSpan.textContent = d;
                cell.appendChild(numSpan);

                let status = 'miss';
                let emojis = [];
                let tooltip = '';
                let allEntries = [];

                if (isFuture) {
                    status = 'future';
                    cell.classList.add('future');
                    cell.style.cursor = 'default';
                } else {
                    cell.classList.add('clickable');
                    const display = getDayDisplay(dateStr);
                    emojis = display.emojis;
                    status = display.status;
                    tooltip = display.tooltip;
                    allEntries = display.allEntries;
                }

                cell.classList.add(status);
                const emojiContainer = document.createElement('div');
                emojiContainer.className = 'emojis-container';
                let shownEmojis = emojis.slice(0, 3);
                let extra = emojis.length - 3;
                shownEmojis.forEach(e => {
                    const span = document.createElement('span');
                    span.className = 'mini-emoji';
                    span.textContent = e;
                    emojiContainer.appendChild(span);
                });
                if (extra > 0) {
                    const more = document.createElement('span');
                    more.className = 'more-indicator';
                    more.textContent = `+${extra}`;
                    emojiContainer.appendChild(more);
                }
                cell.appendChild(emojiContainer);

                if (tooltip) {
                    cell.title = tooltip;
                } else {
                    cell.title = isFuture ? '未来日期' : '无记录，点击添加';
                }

                if (!isFuture) {
                    cell.addEventListener('click', function(e) {
                        openDayDetail(dateStr);
                    });
                }

                grid.appendChild(cell);
            }

            document.getElementById('monthYear').textContent = `${year}年${month+1}月`;
            updateMonthAnalysis(year, month);
        }

        // ============================================================
        //  模态框
        // ============================================================
        const modalOverlay = document.getElementById('modalOverlay');
        const modalBody = document.getElementById('modalBody');
        const modalTitle = document.getElementById('modalTitle');
        document.getElementById('modalClose').addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

        function openDayDetail(dateStr) {
            const rec = getDayRecord(dateStr);
            const today = getTodayStr();
            const isFuture = dateStr > today;

            if (isFuture) {
                modalTitle.textContent = '📅 未来日期';
                modalBody.innerHTML = '<p style="color:#7f6b5a;">不能预录未来的便便，请等到那天再记录吧 😊</p>';
                modalOverlay.classList.add('active');
                return;
            }

            modalTitle.textContent = `📅 ${formatDate(dateStr)} 详情`;
            let html = '';

            if (rec) {
                if (rec.noBowel) {
                    html += `<p>🚫 今日已标记 <strong>无排便</strong></p>`;
                    html += `<div class="modal-actions"><button class="btn-sm secondary" id="modalCancelNoBowel">取消无排便标记</button></div>`;
                } else if (rec.entries && rec.entries.length > 0) {
                    html += `<ul class="record-list" id="modalRecordList">`;
                    rec.entries.forEach((e, idx) => {
                        const t = STOOL_TYPES.find(s => s.id === e.typeId);
                        html += `<li data-index="${idx}">
                                    <span class="type-emoji">${t ? t.emoji : '?'}</span>
                                    <span>${t ? t.label : ''}</span>
                                    <span class="time">${e.time || ''}</span>
                                    <span class="edit-controls">
                                        <button class="edit-entry" data-index="${idx}" title="编辑">✏️</button>
                                        <button class="delete-entry-modal" data-index="${idx}" title="删除">🗑️</button>
                                    </span>
                                </li>`;
                    });
                    html += `</ul>`;
                    html += `<p style="font-size:0.85rem;color:#7f6b5a;">💧 饮水量：${rec.water || 0} ml</p>`;
                    html += `<div class="modal-actions">
                                <button class="btn-sm" id="modalAddEntry">➕ 追加记录</button>
                                <button class="btn-sm secondary" id="modalDeleteDay">🗑️ 删除今日全部记录</button>
                            </div>`;
                } else {
                    html += `<p>该日无有效记录，请补录。</p>`;
                    html += buildSupplementForm(dateStr);
                }
            } else {
                html += `<p>该日尚未记录，请补录。</p>`;
                html += buildSupplementForm(dateStr);
            }

            modalBody.innerHTML = html;
            modalOverlay.classList.add('active');

            // 绑定事件
            if (rec) {
                document.querySelectorAll('.edit-entry').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        openModalInlineEditor(dateStr, idx);
                    });
                });
                document.querySelectorAll('.delete-entry-modal').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        if (confirm('删除这条记录？')) {
                            const rec2 = getDayRecord(dateStr);
                            if (rec2 && rec2.entries) {
                                rec2.entries.splice(idx, 1);
                                if (rec2.entries.length === 0) {
                                    setDayRecord(dateStr, { water: rec2.water || 0, noBowel: false,
                                        entries: [] });
                                } else {
                                    setDayRecord(dateStr, rec2);
                                }
                                closeModal();
                                renderCalendar(currentYear, currentMonth);
                                updateAllAnalyses();
                                if (dateStr === getTodayStr()) loadToday();
                            }
                        }
                    });
                });
                const addBtn = document.getElementById('modalAddEntry');
                if (addBtn) addBtn.addEventListener('click', () => { showAppendModal(dateStr); });
                const delBtn = document.getElementById('modalDeleteDay');
                if (delBtn) delBtn.addEventListener('click', () => {
                    if (confirm(`确定删除 ${formatDate(dateStr)} 的所有记录吗？`)) {
                        deleteDayRecord(dateStr);
                        closeModal();
                        renderCalendar(currentYear, currentMonth);
                        updateAllAnalyses();
                        if (dateStr === getTodayStr()) loadToday();
                    }
                });
                const cancelNoBowel = document.getElementById('modalCancelNoBowel');
                if (cancelNoBowel) {
                    cancelNoBowel.addEventListener('click', () => {
                        const rec2 = getDayRecord(dateStr);
                        if (rec2) {
                            rec2.noBowel = false;
                            setDayRecord(dateStr, rec2);
                            closeModal();
                            renderCalendar(currentYear, currentMonth);
                            updateAllAnalyses();
                            if (dateStr === getTodayStr()) loadToday();
                        }
                    });
                }
            }

            const supplementForm = document.getElementById('supplementForm');
            if (supplementForm) {
                const miniBtns = supplementForm.querySelectorAll('.stool-mini');
                miniBtns.forEach(btn => {
                    btn.addEventListener('click', function() {
                        miniBtns.forEach(b => b.classList.remove('selected-mini'));
                        this.classList.add('selected-mini');
                    });
                });
                const noPoopMini = supplementForm.querySelector('.no-poop-mini');
                if (noPoopMini) {
                    noPoopMini.addEventListener('click', function() {
                        this.classList.toggle('active');
                        if (this.classList.contains('active')) {
                            miniBtns.forEach(b => b.classList.remove('selected-mini'));
                        }
                    });
                }
                const saveSupp = supplementForm.querySelector('.btn-sm');
                if (saveSupp) {
                    saveSupp.addEventListener('click', function(e) {
                        e.preventDefault();
                        const date = this.dataset.date;
                        const water = parseInt(supplementForm.querySelector('input[type="number"]')?.value) || 0;
                        const noBowel = supplementForm.querySelector('.no-poop-mini')?.classList.contains(
                            'active') || false;
                        let typeId = null;
                        const selectedMini = supplementForm.querySelector('.stool-mini.selected-mini');
                        if (selectedMini) typeId = parseInt(selectedMini.dataset.id);
                        if (noBowel) {
                            setDayRecord(date, { noBowel: true, water: water, entries: [] });
                        } else if (typeId) {
                            const entry = { typeId: typeId, time: '补录' };
                            const existing = getDayRecord(date);
                            let newRec;
                            if (existing && !existing.noBowel) {
                                newRec = {
                                    water: water,
                                    noBowel: false,
                                    entries: [...(existing.entries || []), entry]
                                };
                            } else {
                                newRec = {
                                    water: water,
                                    noBowel: false,
                                    entries: [entry]
                                };
                            }
                            setDayRecord(date, newRec);
                        } else {
                            alert('请选择便便类型或标记无排便');
                            return;
                        }
                        closeModal();
                        renderCalendar(currentYear, currentMonth);
                        updateAllAnalyses();
                        if (date === getTodayStr()) loadToday();
                    });
                }
            }
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        function openModalInlineEditor(dateStr, index) {
            const rec = getDayRecord(dateStr);
            if (!rec || !rec.entries || index >= rec.entries.length) return;
            const entry = rec.entries[index];
            const listItem = document.querySelector(`#modalRecordList li[data-index="${index}"]`);
            if (!listItem) return;

            const originalHtml = listItem.innerHTML;
            const typeOptions = STOOL_TYPES.map(s =>
                `<option value="${s.id}" ${s.id === entry.typeId ? 'selected' : ''}>${s.emoji} ${s.label}</option>`
            ).join('');
            const timeVal = entry.time || '';
            listItem.innerHTML = `
                        <select class="edit-type-modal">${typeOptions}</select>
                        <input class="edit-input-modal" type="text" value="${timeVal}" placeholder="时间" style="width:70px;" />
                        <button class="save-edit-modal" style="background:none;border:none;cursor:pointer;font-size:1rem;">💾</button>
                        <button class="cancel-edit-modal" style="background:none;border:none;cursor:pointer;font-size:1rem;">✖</button>
                    `;

            const sel = listItem.querySelector('.edit-type-modal');
            const inp = listItem.querySelector('.edit-input-modal');
            const saveBtn = listItem.querySelector('.save-edit-modal');
            const cancelBtn = listItem.querySelector('.cancel-edit-modal');

            saveBtn.addEventListener('click', function() {
                const newTypeId = parseInt(sel.value);
                const newTime = inp.value.trim();
                const rec2 = getDayRecord(dateStr);
                if (rec2 && rec2.entries && index < rec2.entries.length) {
                    rec2.entries[index].typeId = newTypeId;
                    rec2.entries[index].time = newTime || '';
                    setDayRecord(dateStr, rec2);
                    closeModal();
                    openDayDetail(dateStr);
                    renderCalendar(currentYear, currentMonth);
                    updateAllAnalyses();
                    if (dateStr === getTodayStr()) loadToday();
                }
            });
            cancelBtn.addEventListener('click', function() {
                listItem.innerHTML = originalHtml;
                const newEditBtn = listItem.querySelector('.edit-entry');
                if (newEditBtn) {
                    newEditBtn.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        openModalInlineEditor(dateStr, idx);
                    });
                }
                const newDelBtn = listItem.querySelector('.delete-entry-modal');
                if (newDelBtn) {
                    newDelBtn.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        if (confirm('删除这条记录？')) {
                            const rec3 = getDayRecord(dateStr);
                            if (rec3 && rec3.entries) {
                                rec3.entries.splice(idx, 1);
                                if (rec3.entries.length === 0) {
                                    setDayRecord(dateStr, { water: rec3.water || 0, noBowel: false,
                                        entries: [] });
                                } else {
                                    setDayRecord(dateStr, rec3);
                                }
                                closeModal();
                                renderCalendar(currentYear, currentMonth);
                                updateAllAnalyses();
                                if (dateStr === getTodayStr()) loadToday();
                            }
                        }
                    });
                }
            });
        }

        function buildSupplementForm(dateStr) {
            let html = `<form id="supplementForm">`;
            html += `<div style="display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;">`;
            STOOL_TYPES.forEach(t => {
                html += `<span class="stool-mini" data-id="${t.id}" style="font-size:2rem;padding:6px 12px;">${t.emoji}</span>`;
            });
            html += `</div>`;
            html += `<div style="margin:8px 0;"><button type="button" class="no-poop-mini">🚫 无排便</button></div>`;
            html += `<div class="water-mini"><label>💧 饮水量</label><input type="number" value="1500" step="100" min="0" /> ml</div>`;
            html += `<button type="button" class="btn-sm" data-date="${dateStr}">✅ 保存补录</button>`;
            html += `</form>`;
            return html;
        }

        function showAppendModal(dateStr) {
            const container = document.createElement('div');
            container.innerHTML = `
                        <div style="margin:12px 0;">
                            <p>追加一条记录：</p>
                            <div style="display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;">
                                ${STOOL_TYPES.map(t => `<span class="stool-mini" data-id="${t.id}" style="font-size:2rem;padding:6px 12px;cursor:pointer;border:2px solid transparent;border-radius:20px;">${t.emoji}</span>`).join('')}
                            </div>
                            <button id="appendSaveBtn" class="btn-sm">➕ 追加</button>
                        </div>
                    `;
            modalBody.innerHTML = '';
            modalBody.appendChild(container);
            const miniBtns = container.querySelectorAll('.stool-mini');
            miniBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    miniBtns.forEach(b => { b.style.borderColor = 'transparent';
                        b.style.background = ''; });
                    this.style.borderColor = '#c7a17a';
                    this.style.background = '#ede5db';
                });
            });
            container.querySelector('#appendSaveBtn').addEventListener('click', function() {
                const selected = container.querySelector('.stool-mini[style*="border-color: rgb(199, 161, 122)"]');
                if (!selected) { alert('请选择类型'); return; }
                const typeId = parseInt(selected.dataset.id);
                const now = new Date();
                const timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2,
                '0');
                const entry = { typeId, time: timeStr };
                const rec = getDayRecord(dateStr);
                if (rec && !rec.noBowel) {
                    rec.entries = [...(rec.entries || []), entry];
                    setDayRecord(dateStr, rec);
                } else {
                    const water = rec ? rec.water || 0 : 0;
                    setDayRecord(dateStr, { water, noBowel: false, entries: [entry] });
                }
                closeModal();
                renderCalendar(currentYear, currentMonth);
                updateAllAnalyses();
                if (dateStr === getTodayStr()) loadToday();
            });
        }

        // ============================================================
        //  分析函数
        // ============================================================
        function updateAllAnalyses() {
            renderWeekRecords();
            if (document.getElementById('tab-calendar').classList.contains('active')) {
                updateMonthAnalysis(currentYear, currentMonth);
            }
        }

        function updateMonthAnalysis(year, month) {
            const all = getRecords();
            const monthStr = String(month + 1).padStart(2, '0');
            const yearStr = String(year);
            const prefix = `${yearStr}-${monthStr}`;

            const filteredDates = Object.keys(all).filter(d => {
                if (!d.startsWith(prefix)) return false;
                const rec = all[d];
                return rec && (rec.entries?.length > 0 || rec.noBowel);
            });
            filteredDates.sort();

            const container = document.getElementById('monthAnalysisContent');
            const titleEl = document.getElementById('monthAnalysisTitle');
            if (filteredDates.length === 0) {
                titleEl.textContent = `📊 ${year}年${month+1}月 分析`;
                container.innerHTML = '<p>该月暂无记录。</p>';
                return;
            }

            titleEl.textContent = `📊 ${year}年${month+1}月 分析`;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = getTodayStr();
            let effectiveDays = daysInMonth;
            const now = new Date();
            if (now.getFullYear() === year && now.getMonth() === month) {
                effectiveDays = now.getDate();
            }

            let totalEntries = 0,
                goodCount = 0,
                badCount = 0,
                noBowelDays = 0,
                recordedDays = 0;
            filteredDates.forEach(d => {
                const rec = all[d];
                if (rec.noBowel) { noBowelDays++; return; }
                if (rec.entries && rec.entries.length > 0) {
                    recordedDays++;
                    rec.entries.forEach(e => {
                        totalEntries++;
                        const t = STOOL_TYPES.find(s => s.id === e.typeId);
                        if (t) {
                            if (t.score >= 7) goodCount++;
                            else if (t.score < 4) badCount++;
                        }
                    });
                }
            });

            const coverage = effectiveDays > 0 ? Math.round((recordedDays / effectiveDays) * 100) : 0;
            const avgPerDay = effectiveDays > 0 ? (totalEntries / effectiveDays).toFixed(2) : 0;
            const healthRatio = totalEntries > 0 ? Math.round((goodCount / totalEntries) * 100) : 0;

            let summary = `<div class="stat-grid">`;
            summary += `<div class="stat-item"><span>记录覆盖率</span><span class="val">${coverage}%</span></div>`;
            summary += `<div class="stat-item"><span>总排便次数</span><span class="val">${totalEntries}</span></div>`;
            summary += `<div class="stat-item"><span>日均排便</span><span class="val">${avgPerDay} 次/天</span></div>`;
            summary += `<div class="stat-item"><span>健康形态占比</span><span class="val">${healthRatio}%</span></div>`;
            summary += `<div class="stat-item"><span>无排便天数</span><span class="val">${noBowelDays} 天</span></div>`;
            summary += `</div>`;

            let advice = '';
            if (totalEntries === 0 && noBowelDays === 0) advice = '该月暂无排便数据。';
            else if (healthRatio >= 70 && noBowelDays <= 2) advice = '🌟 该月肠道状态非常健康！';
            else if (healthRatio >= 50) advice = '👍 该月肠道状态良好，注意保持。';
            else if (badCount > totalEntries * 0.3) advice = '⚠️ 异常形态占比较高，注意饮食。';
            else if (noBowelDays > effectiveDays * 0.3) advice = '⚠️ 排便频率偏低，注意饮水和运动。';
            else advice = '继续关注肠道健康。';
            summary += `<div class="summary-text">💬 ${advice}</div>`;
            container.innerHTML = summary;
        }

        // ============================================================
        //  Tab切换
        // ============================================================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const tab = this.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById('tab-' + tab).classList.add('active');
                if (tab === 'calendar') {
                    renderCalendar(currentYear, currentMonth);
                } else if (tab === 'daily') {
                    renderWeekRecords();
                }
            });
        });

        // ============================================================
        //  初始化
        // ============================================================
        window.selectedTypeId = null;
        window.noPoopActive = false;

        loadToday();
        renderCalendar(currentYear, currentMonth);
        renderWeekRecords();
        updateMonthAnalysis(currentYear, currentMonth);

        console.log('🚽 布里斯托探员 · 最终版已启动！');
    </script>
</body>
</html>
